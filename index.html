<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portfolio - Accueil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body { display: flex; min-height: 100vh; overflow-x: hidden; }
    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #ff7eb3, #ff758c, #ff7eb3);
      color: white;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      padding: 20px;
      box-shadow: 3px 0 10px rgba(0,0,0,0.2);
      animation: slideIn 1s ease-out;
    }
    .sidebar a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 12px;
      border-radius: 8px;
      transition: background 0.3s, transform 0.2s;
    }
    .sidebar a:hover {
      background: rgba(255,255,255,0.2);
      transform: translateX(5px);
    }
    .content {
      margin-left: 240px;
      padding: 40px;
      flex: 1;
      background: linear-gradient(120deg, #fdfbfb, #ebedee);
      animation: fadeIn 1.2s ease-in;
    }
    .btn-redirect {
      display: inline-block;
      padding: 20px 30px;
      font-size: 1.2rem;
      border-radius: 15px;
      text-decoration: none;
      margin: 15px;
      transition: all 0.4s ease;
      color: white;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }
    .btn-redirect:hover {
      transform: scale(1.1) rotate(-2deg);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .btn-projets { background: linear-gradient(135deg, #36d1dc, #5b86e5); }
    .btn-veilles { background: linear-gradient(135deg, #ff9966, #ff5e62); }
    .btn-parcours { background: linear-gradient(135deg, #56ab2f, #a8e063); }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { transform: translateX(-250px); }
      to { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <!-- Menu latéral -->
  <div class="sidebar">
    <h3 class="mb-4">🌟 Mon Portfolio</h3>
    <a href="index.html">Accueil</a>
    <a href="presentation.html">Présentation</a>
    <a href="parcours.html">Parcours</a>
    <a href="projets.html">Projets</a>
    <a href="veilles.html">Veilles</a>
    <a href="contact.html">Contact</a>
    <a href="stage-1.html">Stage n°1</a>
  </div>

  <!-- Contenu -->
  <div class="content text-center">
    <h1 class="mb-4">Bienvenue sur mon Portfolio</h1>
    <p class="lead">Je suis étudiant en 2ème année de BTS SIO. Découvrez mes projets, mon parcours et mes veilles technologiques.</p>

    <!-- Boutons animés -->
    <div class="mt-5">
      <a href="projets.html" class="btn-redirect btn-projets">🚀 Voir mes Projets</a>
      <a href="veilles.html" class="btn-redirect btn-veilles">🔎 Explorer mes Veilles</a>
      <a href="parcours.html" class="btn-redirect btn-parcours">📘 Découvrir mon Parcours</a>
    </div>
  </div>
</body>
</html>
