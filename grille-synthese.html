<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grille de Synthèse - Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <!-- Hamburger Menu -->
  <button class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h3>🌟 Portfolio</h3>
    <a href="index.html">🏠 Accueil</a>
    <a href="presentation.html">👤 Présentation</a>
    <a href="parcours.html">📚 Parcours</a>
    <a href="projets.html">💻 Projets</a>
    <a href="veilles.html">💡 Veilles</a>
    <a href="contact.html">📧 Contact</a>
    <a href="stage-1.html">💼 Stage n°1</a>
    <a href="stage-2.html">💼 Stage n°2</a>
    <a href="grille-synthese.html">📊 Grille de Synthèse</a>
    <button id="darkModeToggle" class="btn-dark-mode">🌙 Mode Sombre</button>
  </div>

  <!-- Contenu -->
  <div class="content">
    <div class="hero text-center">
      <h1>Grille de Synthèse 📊</h1>
      <p class="lead">Résumé de mes compétences et réalisations</p>
    </div>

    <!-- Images -->
    <div class="row mt-5">
      <div class="col-md-12">
        <div class="card p-4 shadow mb-4">
          <h3>Synthèse de mes apprentissages</h3>
            </div>
          </div>

          <!-- Bouton PDF -->
          <div class="text-center mt-4">
            <a href="pdf/GRILLE EVALUATION.pdf" target="_blank" class="btn btn-success">
              📄 Voir la grille complète en PDF
            </a>
          </div>

        </div>
      </div>
    </div>

    <!-- Retour -->
    <div class="text-center mt-4">
      <a href="index.html" class="btn btn-primary">← Retour à l'accueil</a>
    </div>

    <!-- Modal -->
    <div id="imageModal" class="modal-lightbox">
      <div class="lightbox-content">
        <span class="lightbox-close" onclick="closeImage()">&times;</span>

        <div class="lightbox-zoom-controls">
          <button onclick="zoomOut()" class="zoom-btn">−</button>
          <span id="zoomLevel">100%</span>
          <button onclick="zoomIn()" class="zoom-btn">+</button>
          <button onclick="resetZoom()" class="zoom-btn reset">Réinitialiser</button>
        </div>

        <div class="lightbox-image-container">
          <img id="modalImage" src="" alt="Image agrandie">
        </div>
      </div>
    </div>
  </div>

<script>
let currentZoom = 100;
const maxZoom = 300;
const minZoom = 50;
const zoomStep = 20;

function openImage(src, alt) {
  const modal = document.getElementById('imageModal');
  const modalImage = document.getElementById('modalImage');

  modalImage.src = src;
  modalImage.alt = alt;

  modal.style.display = 'flex';
  currentZoom = 100;
  updateZoom();

  document.body.style.overflow = 'hidden';
}

function closeImage() {
  document.getElementById('imageModal').style.display = 'none';
  document.body.style.overflow = 'auto';
}

function zoomIn() {
  if (currentZoom < maxZoom) {
    currentZoom += zoomStep;
    updateZoom();
  }
}

function zoomOut() {
  if (currentZoom > minZoom) {
    currentZoom -= zoomStep;
    updateZoom();
  }
}

function resetZoom() {
  currentZoom = 100;
  updateZoom();
}

function updateZoom() {
  const scale = currentZoom / 100;
  document.getElementById('modalImage').style.transform = `scale(${scale})`;
  document.getElementById('zoomLevel').textContent = currentZoom + '%';
}

document.addEventListener('wheel', (e) => {
  const modal = document.getElementById('imageModal');
  if (modal.style.display === 'flex') {
    e.preventDefault();
    e.deltaY < 0 ? zoomIn() : zoomOut();
  }
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeImage();
});

document.getElementById('imageModal').addEventListener('click', (e) => {
  if (e.target.id === 'imageModal') closeImage();
});

// Menu burger
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');

hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  sidebar.classList.toggle('active');
});

document.querySelectorAll('.sidebar a').forEach(link => {
  link.addEventListener('click', () => {
    hamburger.classList.remove('active');
    sidebar.classList.remove('active');
  });
});

// Dark mode
const darkModeToggle = document.getElementById('darkModeToggle');

if (localStorage.getItem('darkMode') === 'enabled') {
  document.body.classList.add('dark-mode');
  darkModeToggle.textContent = '☀️ Mode Clair';
}

darkModeToggle.addEventListener('click', () => {
  document.body.classList.toggle('dark-mode');

  if (document.body.classList.contains('dark-mode')) {
    localStorage.setItem('darkMode', 'enabled');
    darkModeToggle.textContent = '☀️ Mode Clair';
  } else {
    localStorage.setItem('darkMode', 'disabled');
    darkModeToggle.textContent = '🌙 Mode Sombre';
  }
});
</script>

</body>
</html>
