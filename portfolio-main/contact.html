  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <!-- Hamburger Menu -->
  <button class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h3 class="mb-4">🌟 Mon Portfolio</h3>
    <a href="index.html">🏠 Accueil</a>
    <a href="presentation.html">👤 Présentation</a>
    <a href="parcours.html">📚 Parcours</a>
    <a href="projets.html">💻 Projets</a>
    <a href="veilles.html">💡 Veilles</a>
    <a href="contact.html">📧 Contact</a>
    <a href="stage-1.html">💼 Stage n°1</a>
    <a href="stage-2.html">💼 Stage n°2</a>
    <a href="grille-synthese.html">📊 Grille de Synthèse</a>
    <button id="darkModeToggle" class="btn-dark-mode">🌙 Mode Sombre</button>
  </div>

  <!-- Contenu -->
  <div class="content">
    <div class="hero text-center">
      <h1>Contact 📬</h1>
      <p class="lead">Vous pouvez me contacter via ces coordonnées :</p>
    </div>

    <div class="row mt-5 justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow text-center">
          <h5>📧 Email</h5>

        </div>
    </div>
  </div>
</body>

<script>
  // Menu Burger
  const hamburger = document.getElementById('hamburger');
  const sidebar = document.getElementById('sidebar');

  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    sidebar.classList.toggle('active');
  });

  // Fermer le menu quand on clique sur un lien
  document.querySelectorAll('.sidebar a').forEach(link => {
    link.addEventListener('click', () => {
      hamburger.classList.remove('active');
      sidebar.classList.remove('active');
    });
  });

  // Mode sombre
  const darkModeToggle = document.getElementById('darkModeToggle');
  const body = document.body;
  
  // Charger le mode sombre depuis localStorage
  if (localStorage.getItem('darkMode') === 'enabled') {
    body.classList.add('dark-mode');
    darkModeToggle.textContent = '☀️ Mode Clair';
  }
  
  darkModeToggle.addEventListener('click', () => {
    body.classList.toggle('dark-mode');
    if (body.classList.contains('dark-mode')) {
      localStorage.setItem('darkMode', 'enabled');
      darkModeToggle.textContent = '☀️ Mode Clair';
    } else {
      localStorage.setItem('darkMode', 'disabled');
      darkModeToggle.textContent = '🌙 Mode Sombre';
    }
  });
</script>

</html>
